apiVersion: apps/v1
kind: Deployment
metadata:
  name: iss-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ingest
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ingest
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ingest
          image: iss-datacenters-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "pipeline.ingest_to_kafka"]
          envFrom:
            - configMapRef:
                name: iss-anomaly-config
            - secretRef:
                name: iss-anomaly-secrets
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
