name: iss-datacenters

services:
  postgres:
    image: postgres:16
    container_name: iss-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iss_password}
      POSTGRES_DB: ${POSTGRES_DB:-iss_telemetry}
    ports:
      - "5432:5432"
    volumes:
      - iss_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: iss-redis
    ports:
      - "6379:6379"
    volumes:
      - iss_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  kafka:
    image: apache/kafka:3.7.1
    container_name: iss-kafka
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - iss_kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  api:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: iss-api
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-telemetry.raw}
      KAFKA_ANOMALY_TOPIC: ${KAFKA_ANOMALY_TOPIC:-anomaly.events}
      KAFKA_INJECTION_TOPIC: ${KAFKA_INJECTION_TOPIC:-injection.jobs}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-iss-worker}
      KAFKA_NOTIFICATION_CONSUMER_GROUP: ${KAFKA_NOTIFICATION_CONSUMER_GROUP:-iss-notifications}
      KAFKA_INJECTION_CONSUMER_GROUP: ${KAFKA_INJECTION_CONSUMER_GROUP:-iss-injection-worker}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-iss_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-iss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iss_password}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://your-frontend.vercel.app}
      RULES_FILE_PATH: ${RULES_FILE_PATH:-config/rules.json}
      DATA_ROOT: /app/data
      COLLECTOR_RAW_ROOT: /app/data/raw
      COLLECTOR_MANIFEST_PATH: /app/data/manifest.json
      PROTOTYPE_LIBRARY_DIR: ${PROTOTYPE_LIBRARY_DIR:-/app/data/anomaly_prototypes/smap_final9_v01}
      REDIS_RECENT_HISTORY_LIMIT: ${REDIS_RECENT_HISTORY_LIMIT:-100}
      INJECTION_MAX_POINTS: ${INJECTION_MAX_POINTS:-500}
      TELEMETRY_RETENTION_DAYS: ${TELEMETRY_RETENTION_DAYS:-28}
      DEFAULT_NOTIFICATION_COOLDOWN_MINUTES: ${DEFAULT_NOTIFICATION_COOLDOWN_MINUTES:-10}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-iss-alerts@example.com}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ../data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: iss-worker
    command: ["python", "-m", "pipeline.worker"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-telemetry.raw}
      KAFKA_ANOMALY_TOPIC: ${KAFKA_ANOMALY_TOPIC:-anomaly.events}
      KAFKA_INJECTION_TOPIC: ${KAFKA_INJECTION_TOPIC:-injection.jobs}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-iss-worker}
      KAFKA_NOTIFICATION_CONSUMER_GROUP: ${KAFKA_NOTIFICATION_CONSUMER_GROUP:-iss-notifications}
      KAFKA_INJECTION_CONSUMER_GROUP: ${KAFKA_INJECTION_CONSUMER_GROUP:-iss-injection-worker}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-iss_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-iss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iss_password}
      RULES_FILE_PATH: ${RULES_FILE_PATH:-config/rules.json}
      REDIS_RECENT_HISTORY_LIMIT: ${REDIS_RECENT_HISTORY_LIMIT:-100}
      PROTOTYPE_LIBRARY_DIR: ${PROTOTYPE_LIBRARY_DIR:-/app/data/anomaly_prototypes/smap_final9_v01}
      INJECTION_MAX_POINTS: ${INJECTION_MAX_POINTS:-500}
      TELEMETRY_RETENTION_DAYS: ${TELEMETRY_RETENTION_DAYS:-28}
      DEFAULT_NOTIFICATION_COOLDOWN_MINUTES: ${DEFAULT_NOTIFICATION_COOLDOWN_MINUTES:-10}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-iss-alerts@example.com}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  ingest:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: iss-ingest
    command: ["python", "-m", "pipeline.ingest_to_kafka"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LIGHTSTREAMER_SERVER: ${LIGHTSTREAMER_SERVER:-https://push.lightstreamer.com}
      LIGHTSTREAMER_ADAPTER_SET: ${LIGHTSTREAMER_ADAPTER_SET:-ISSLIVE}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-telemetry.raw}
    depends_on:
      kafka:
        condition: service_healthy

  notifications:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: iss-notifications
    command: ["python", "-m", "notifications.service"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_ANOMALY_TOPIC: ${KAFKA_ANOMALY_TOPIC:-anomaly.events}
      KAFKA_NOTIFICATION_CONSUMER_GROUP: ${KAFKA_NOTIFICATION_CONSUMER_GROUP:-iss-notifications}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-iss_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-iss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iss_password}
      DEFAULT_NOTIFICATION_COOLDOWN_MINUTES: ${DEFAULT_NOTIFICATION_COOLDOWN_MINUTES:-10}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-iss-alerts@example.com}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  injections:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: iss-injections
    command: ["python", "-m", "injections.service"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TELEMETRY_TOPIC: ${KAFKA_TELEMETRY_TOPIC:-telemetry.raw}
      KAFKA_INJECTION_TOPIC: ${KAFKA_INJECTION_TOPIC:-injection.jobs}
      KAFKA_INJECTION_CONSUMER_GROUP: ${KAFKA_INJECTION_CONSUMER_GROUP:-iss-injection-worker}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-iss_telemetry}
      POSTGRES_USER: ${POSTGRES_USER:-iss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iss_password}
      PROTOTYPE_LIBRARY_DIR: ${PROTOTYPE_LIBRARY_DIR:-/app/data/anomaly_prototypes/smap_final9_v01}
      INJECTION_MAX_POINTS: ${INJECTION_MAX_POINTS:-500}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ../data:/app/data


volumes:
  iss_postgres_data:
  iss_redis_data:
  iss_kafka_data:
