name: iss-datacenters

services:
  postgres:
    image: postgres:16
    container_name: iss-postgres
    environment:
      POSTGRES_USER: iss_user
      POSTGRES_PASSWORD: iss_password
      POSTGRES_DB: iss_telemetry
    ports:
      - "5432:5432"
    volumes:
      - iss_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: iss-redis
    ports:
      - "6379:6379"
    volumes:
      - iss_redis_data:/data

  kafka:
    image: apache/kafka:3.7.1
    container_name: iss-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - iss_kafka_data:/var/lib/kafka/data


volumes:
  iss_postgres_data:
  iss_redis_data:
  iss_kafka_data: